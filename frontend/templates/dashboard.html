{% extends "base.html" %}

{% block title %}Dashboard - Sitters with Love{% endblock %}

{% block content %}
    <div class="dashboard-actions">
        <button type="button" id="btn-nuevo-contrato-dashboard" class="btn-principal">Nuevo contrato</button>
    </div>
    <section id="dashboard-contratos-activos-section" class="dashboard-section dashboard-section--activos">
        <div class="dashboard-section-header">
            <h2 id="cabecera" class="day-header dashboard-section-title section-header-brand">Contratos activos</h2>
        </div>
        <div id="contratos-activos"></div>
    </section>
    <section id="dashboard-contratos-programados-section" class="dashboard-section dashboard-section--programados">
        <div class="dashboard-section-header">
            <h2 class="day-header dashboard-section-title section-header-brand">Todos los contratos</h2>
        </div>
        <input type="text" id="buscar-contratos" class="buscar" placeholder="Buscar por animal">
        <div id="contratos-programados"></div>
    </section>
    <div id="muestra-contrato"></div>
    <script src="{{ url_for('static', filename='js/dashboard.js', v='20260318-loading-states') }}"></script>
{% endblock %}
