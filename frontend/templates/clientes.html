{% extends "base.html" %}

{% block title %}Clientes - Sitters with Love{% endblock %}

{% block content %}

<h2 id="cabecera" class="day-header section-header-brand">Clientes</h2>
<input type="text" id="buscar" class="buscar" placeholder="Buscar clientes">
<div class="cliente-actions">
    <button type="button" id="abrir-cliente-modal" class="btn-principal">Añadir cliente</button>
</div>
<div id="lista-clientes"></div>
<div id="muestra-cliente"></div>

<div id="cliente-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-cliente-modal></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="cliente-modal-title">
        <button type="button" class="modal-close" aria-label="Cerrar" data-close-cliente-modal>&times;</button>
        <h3 id="cliente-modal-title" class="modal-title">Añadir cliente</h3>
        <form id="cliente-form" class="modal-form form-columns" novalidate>
            <div id="form-cliente-error" class="modal-error" role="alert" aria-live="assertive" hidden></div>
            <div class="form-column">
                <input type="text" id="nombre" placeholder="Nombre" required>
                <input type="text" id="apellidos" placeholder="Apellidos (opcional)">
                <input type="text" id="calle" placeholder="Calle">
                <input type="text" id="piso" placeholder="Piso">
                <input type="text" id="codigo_postal" placeholder="Código Postal">
                <input type="text" id="municipio" placeholder="Municipio / Barrio">
                <input type="text" id="pais" placeholder="País" value="Luxembourg">
            </div>
            <div class="form-column">
                <input type="text" id="telefono" placeholder="Teléfono +352 661 222 222">
                <input type="email" id="email" placeholder="Correo Electrónico">
                <input type="text" id="nacionalidad" placeholder="País de origen">
                <input type="text" id="idioma" placeholder="Idioma">
                <select id="genero">
                    <option value="">Género</option>
                    <option value="M">M</option>
                    <option value="F">F</option>
                </select>
                <input type="text" id="referencia_origen" placeholder="Referencia">
                <label for="whatsapp_avatar">Avatar grupo WhatsApp</label>
                <input type="file" id="whatsapp_avatar" accept="image/*">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secundario" data-close-cliente-modal>Cancelar</button>
                <button type="submit" class="btn-principal">Guardar cliente</button>
            </div>
        </form>
    </div>
</div>

<div id="contrato-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="contrato-modal-title">
        <button type="button" class="modal-close" aria-label="Cerrar" data-close-modal>&times;</button>
        <h3 id="contrato-modal-title" class="modal-title">Nuevo contrato</h3>
        <p class="modal-subtitle" id="numero_factura_resumen">Número de factura: Se asignará al guardar</p>
        <p id="contrato-modal-cliente" class="modal-subtitle" hidden></p>
        <div id="form-contrato-error" class="modal-error" role="alert" aria-live="assertive" hidden></div>
        <form id="form-contrato" class="modal-form" novalidate>
            <div class="modal-field">
                <label for="fecha_inicio">Fecha de inicio <span class="required">*</span></label>
                <input type="date" id="fecha_inicio" required>
            </div>
            <div class="modal-field">
                <label for="fecha_fin">Fecha de fin <span class="required">*</span></label>
                <input type="date" id="fecha_fin" required>
            </div>
            <div class="modal-field">
                <label for="numero_visitas_diarias">Número de visitas diarias <span class="required">*</span></label>
                <input type="number" id="numero_visitas_diarias" min="0" step="1" placeholder="Ej: 2" required>
            </div>
            <div class="modal-field">
                <label for="numero_visitas_totales">Número de visitas totales</label>
                <input type="number" id="numero_visitas_totales" min="0" placeholder="0">
                <p class="modal-helper" id="numero_dias_resumen">Días calculados: 0</p>
            </div>
            <div class="modal-field">
                <label for="tarifa_contrato">Tarifa del contrato <span class="required">*</span></label>
                <select id="tarifa_contrato" required>
                    <option value="" disabled selected>Cargando tarifas...</option>
                </select>
            </div>
            <div class="modal-field modal-field-inline">
                <div>
                    <label for="hora_manana">Hora mañana</label>
                    <input type="time" id="hora_manana">
                </div>
                <div>
                    <label for="hora_tarde">Hora tarde</label>
                    <input type="time" id="hora_tarde">
                </div>
            </div>
            <div class="modal-field">
                <label for="total_contrato">Total contrato (€)</label>
                <input type="number" id="total_contrato" min="0" step="0.01" value="0">
                <p class="modal-helper" id="mitad_total_resumen">50% del total: 0,00 €</p>
            </div>
            <div class="modal-field">
                <label for="pagado">Pagado (€) <span class="required">*</span></label>
                <input type="number" id="pagado" min="0" step="0.01" value="0" required>
            </div>
            <div class="modal-field">
                <label for="observaciones">Observaciones</label>
                <textarea id="observaciones" rows="3" placeholder="Notas importantes"></textarea>
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secundario" data-close-modal>Cancelar</button>
                <button type="submit" class="btn-principal">Guardar contrato</button>
            </div>
        </form>
    </div>
</div>

<div id="animal-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-animal-modal></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="animal-modal-title">
        <button type="button" class="modal-close" aria-label="Cerrar" data-close-animal-modal>&times;</button>
        <h3 id="animal-modal-title" class="modal-title">Nuevo animal</h3>
        <p id="animal-modal-cliente" class="modal-subtitle" hidden></p>
        <div id="form-animal-error" class="modal-error" role="alert" aria-live="assertive" hidden></div>
        <form id="form-animal-cliente" class="modal-form" enctype="multipart/form-data" novalidate>
            <div class="modal-field">
                <label for="animal_nombre">Nombre <span class="required">*</span></label>
                <input type="text" id="animal_nombre" required>
            </div>
            <div class="modal-field">
                <label for="animal_tipo">Tipo de animal</label>
                <input type="text" id="animal_tipo" placeholder="Perro, gato...">
            </div>
            <div class="modal-field">
                <label for="animal_sexo">Sexo</label>
                <select id="animal_sexo">
                    <option value="">Sin especificar</option>
                    <option value="M">M</option>
                    <option value="F">F</option>
                </select>
            </div>
            <div class="modal-field">
                <label for="animal_edad">Año de nacimiento (opcional)</label>
                <input type="number" id="animal_edad" placeholder="Ej: 2019" min="1900" max="2999" step="1">
            </div>
            <div class="modal-field">
                <label for="animal_medicacion">Medicación</label>
                <div class="rich-editor">
                    <div class="rich-editor-toolbar" aria-label="Formato de medicación">
                        <button type="button" class="rich-editor-button" data-editor-target="animal_medicacion" data-command="formatBlock" data-value="p">Párrafo</button>
                        <button type="button" class="rich-editor-button" data-editor-target="animal_medicacion" data-command="insertUnorderedList">Lista</button>
                        <button type="button" class="rich-editor-button" data-editor-target="animal_medicacion" data-command="insertOrderedList">Numerada</button>
                    </div>
                    <div id="animal_medicacion" class="rich-editor-input" contenteditable="true" data-placeholder="Añade medicación, instrucciones o pautas"></div>
                </div>
            </div>
            <div class="modal-field">
                <label for="animal_foto">Foto</label>
                <input type="file" id="animal_foto" accept="image/*">
            </div>
            <div class="modal-actions">
                <button type="button" class="btn-secundario" data-close-animal-modal>Cancelar</button>
                <button type="submit" class="btn-principal">Guardar animal</button>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='js/clientes.js', v='20260318-clientes-lista-null') }}"></script>

{% endblock %}
