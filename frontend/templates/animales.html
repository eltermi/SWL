{% extends "base.html" %}

{% block title %}Animales - Sitters with Love{% endblock %}

{% block content %}


<h2 id="cabecera" class="day-header section-header-brand">Animales</h2>
<input type="text" id="buscar" class="buscar" placeholder="Buscar animales">
<label class="list-filter-toggle" for="mostrar-fallecidos-animales">
    <input type="checkbox" id="mostrar-fallecidos-animales">
    Mostrar también animales fallecidos
</label>
<div class="cliente-actions">
    <button type="button" id="abrir-animal-modal" class="btn-principal">Añadir animal</button>
</div>
<div id="lista-animales"></div>
<div id="muestra-animal"></div>

<div id="animal-modal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-animal-modal></div>
    <div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="animal-modal-title">
        <button type="button" class="modal-close" aria-label="Cerrar" data-close-animal-modal>&times;</button>
        <h3 id="animal-modal-title" class="modal-title">Añadir animal</h3>
        <form id="animal-form" class="modal-form" enctype="multipart/form-data" novalidate>
            <div id="form-animal-error-general" class="modal-error" role="alert" aria-live="assertive" hidden></div>
            <div class="modal-field">
                <label for="form-nombre-animal">Nombre <span class="required">*</span></label>
                <input type="text" id="form-nombre-animal" required>
            </div>
            <div class="modal-field">
                <label for="form-nombre-cliente">Cliente <span class="required">*</span></label>
                <select id="form-nombre-cliente" required>
                    <option value="">Selecciona un cliente</option>
                </select>
            </div>
            <div class="modal-field">
                <label for="form-sexo-animal">Sexo</label>
                <select id="form-sexo-animal">
                    <option value="">Sin especificar</option>
                    <option value="M">Macho</option>
                    <option value="F">Hembra</option>
                </select>
            </div>
            <div class="modal-field">
                <label for="form-edad">Año de nacimiento (opcional)</label>
                <input type="number" id="form-edad" min="1900" max="2999" step="1" placeholder="Ej: 2019">
            </div>
            <div class="modal-field">
                <label for="form-tipo-animal">Tipo de animal</label>
                <input type="text" id="form-tipo-animal" placeholder="Perro, gato...">
            </div>
            <div class="modal-field">
                <label for="form-medicacion">Medicación</label>
                <div class="rich-editor">
                    <div class="rich-editor-toolbar" aria-label="Formato de medicación">
                        <button type="button" class="rich-editor-button" data-editor-target="form-medicacion" data-command="formatBlock" data-value="p">Párrafo</button>
                        <button type="button" class="rich-editor-button" data-editor-target="form-medicacion" data-command="insertUnorderedList">Lista</button>
                        <button type="button" class="rich-editor-button" data-editor-target="form-medicacion" data-command="insertOrderedList">Numerada</button>
                    </div>
                    <div id="form-medicacion" class="rich-editor-input" contenteditable="true" data-placeholder="Añade medicación, instrucciones o pautas"></div>
                </div>
            </div>
            <div class="modal-field">
                <label for="form-foto">Foto</label>
                <input type="file" id="form-foto" accept="image/*">
            </div>
            <label class="cliente-edit-checkbox" for="form-fallecido">
                <input type="checkbox" id="form-fallecido">
                Animal fallecido
            </label>
            <div class="modal-actions">
                <button type="button" class="btn-secundario" data-close-animal-modal>Cancelar</button>
                <button type="submit" class="btn-principal">Guardar animal</button>
            </div>
        </form>
    </div>
</div>
<script src="{{ url_for('static', filename='js/animales.js', v='20260318-fallecidos') }}"></script>
{% endblock %}
